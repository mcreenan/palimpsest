# Billing — internal only, same shape as accounts. Reachable from the gateway as
# `billing.internal`.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing
  labels: { app: billing, tier: internal }
spec:
  replicas: 2
  selector:
    matchLabels: { app: billing }
  template:
    metadata:
      labels: { app: billing }
    spec:
      containers:
        - name: billing
          image: ghcr.io/demo-co/platform-billing:latest
          ports:
            - containerPort: 8080
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef: { name: platform-db, key: url }
            - name: PAYMENTS_API_KEY
              valueFrom:
                secretKeyRef: { name: billing-secrets, key: payments-api-key }
---
apiVersion: v1
kind: Service
metadata:
  name: billing
spec:
  selector: { app: billing }
  ports:
    - port: 80
      targetPort: 8080
