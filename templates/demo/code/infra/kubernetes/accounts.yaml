# Accounts — internal only. No Ingress; reachable from the gateway via the
# cluster-internal DNS name `accounts.internal` (see platform proxy.ts).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: accounts
  labels: { app: accounts, tier: internal }
spec:
  replicas: 2
  selector:
    matchLabels: { app: accounts }
  template:
    metadata:
      labels: { app: accounts }
    spec:
      containers:
        - name: accounts
          image: ghcr.io/demo-co/platform-accounts:latest
          ports:
            - containerPort: 8080
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef: { name: platform-db, key: url }
---
apiVersion: v1
kind: Service
metadata:
  name: accounts        # resolves as accounts.internal within the cluster
spec:
  selector: { app: accounts }
  ports:
    - port: 80
      targetPort: 8080
