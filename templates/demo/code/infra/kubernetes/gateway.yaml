# Gateway — the only service exposed to the internet. Deployment + internal
# Service + an Ingress that terminates TLS for api.demo.co.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  labels: { app: gateway, tier: edge }
spec:
  replicas: 3
  selector:
    matchLabels: { app: gateway }
  template:
    metadata:
      labels: { app: gateway }
    spec:
      containers:
        - name: gateway
          image: ghcr.io/demo-co/platform-gateway:latest
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet: { path: /healthz, port: 3000 }
            initialDelaySeconds: 5
          env:
            - name: SESSION_REDIS_URL
              valueFrom:
                secretKeyRef: { name: gateway-secrets, key: redis-url }
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
spec:
  selector: { app: gateway }
  ports:
    - port: 80
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gateway
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
spec:
  rules:
    - host: api.demo.co
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gateway
                port: { number: 80 }
